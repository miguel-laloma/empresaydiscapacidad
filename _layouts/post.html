---
layout: default
---

<article class="post-content">
  <div class="container">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%d de %B de %Y" }}
        </time>
        {% if page.author %}
        <span class="post-author">Por {{ page.author }}</span>
        {% endif %}
      </div>
    </header>
    
    <div class="post-body">
      {{ content }}
    </div>
  </div>
  
  <div class="post-navigation">
    <div class="container">
      {% if page.previous.url %}
      <a href="{{ page.previous.url }}" class="post-nav-link prev-link">
        ← {{ page.previous.title }}
      </a>
      {% endif %}
      
      {% if page.next.url %}
      <a href="{{ page.next.url }}" class="post-nav-link next-link">
        {{ page.next.title }} →
      </a>
      {% endif %}
    </div>
  </div>
</article>
